<head>

</head>

<body>
  <div id="player"></div>

    // const sub1 = "https://rap7c5roebejl0.streamruby.net/vtt/02/00413/m7tdz09jdxzf_eng.vtt";

    const player = jwplayer("player").setup({
      sources: [
        {
          file: source1,
          type: "hls"
        },
      ],
      // image: thumbnail,
      width: "100%",
      height: "100%",
      stretching: "uniform",
      // duration: "1420",

      // tracks: [
      //   {
      //     file: sub1,
      //     label: "English",
      //     kind: "captions",
      //     default: true,
      //   },
      // ],

      captions: {
        color: "#FFFFFF",
        fontSize: 16,
        backgroundOpacity: 0,
        fontFamily: "Tahoma",
      },

      playbackRates: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 3],

      // qualityLabels: {
      //   "360p": "254",
      //   "480p": "382",
      //   "720p": "670",
      //   "1080p": "1112",
      // },

    player.on("ready", function () {

                </g>
            </svg>`,
        "Audio Settings",
        function () {
          const settingsBtn = document.querySelector(
            "#player .jw-controls .jw-icon-settings",
          );

          if (settingsBtn) {
            settingsBtn.click();
            setTimeout(function () {
              const audioSettingBtn = document.querySelector(
                ".jw-settings-audioTracks",
              );

              if (audioSettingBtn) {
                audioSettingBtn.click();
              } else {
                console.log("audioSettingBtn not found", audioSettingBtn);
              }
            }, 0); // allow DOM update
          } else {
            console.log("settingsBtn not found", settingsBtn);
          }
        },
        "custom-audio-btn",
      );
    });
  </script>
</body>

</html>
