<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidal API Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Shaka Player for DASH playback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        :root {
            --primary: #00e5ff;
            --bg: #0a0b0d;
            --card-bg: #1a1c20;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --modal-bg: rgba(10, 11, 13, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
            background: radial-gradient(circle at top, #001f3f, transparent);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), #007bff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            padding: 1rem;
            background: var(--glass);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
            position: sticky;
            top: 2rem;
            z-index: 100;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .primary-btn {
            padding: 1rem 2rem;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: black;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .primary-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        .section-title {
            font-size: 1.8rem;
            margin-top: 3rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .artwork {
            width: 100%;
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            position: relative;
            background-color: #1a1c20;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .artwork-placeholder {
            font-size: 3rem;
            opacity: 0.2;
        }

        .info {
            padding: 1.5rem;
        }

        .title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .loader {
            text-align: center;
            padding: 2rem;
            font-style: italic;
            color: var(--primary);
            display: none;
        }

        /* Modal Styles */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-bg);
            z-index: 1000;
            backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 900px;
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            position: relative;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--glass);
        }

        .modal-artwork {
            width: 400px;
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 2rem;
            background-color: #1a1c20;
        }

        .modal-info {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .modal-title {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .modal-subtitle {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .modal-desc {
            color: var(--text-dim);
            font-size: 0.95rem;
            overflow-y: auto;
            max-height: 100px;
        }

        .stream-data {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.75rem;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 150px;
            border: 1px solid var(--glass);
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--glass);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        /* Playback UI */
        .playback-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .play-icon {
            font-size: 1.5rem;
        }

        .status-badge {
            background: var(--modal-bg);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--primary);
            backdrop-filter: blur(5px);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(.5);
                opacity: 1;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        #videoElem {
            display: none;
        }

        /* Responsive */
        @media (max-width: 850px) {
            .modal-content {
                flex-direction: column;
                max-height: 95vh;
                overflow-y: auto;
            }

            .modal-artwork {
                width: 100%;
                height: 300px;
            }

            .modal-title {
                font-size: 1.8rem;
            }

            .modal-info {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Tidal API Explorer</h1>
        <p class="subtitle">Experience high-fidelity streaming and robust metadata through our professional Tidal
            provider.</p>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search tracks, albums, artists, or videos..."
                value="Linkin Park Hybrid Theory">
            <button class="primary-btn" onclick="performSearch()">Search</button>
        </div>

        <div id="loader" class="loader">Accessing Tidal High Fidelity...</div>

        <div id="results">
            <!-- Results will be injected here -->
        </div>
    </div>

    <div id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modalArtwork" class="modal-artwork">
                <div id="playingBadge" class="status-badge" style="display: none;">
                    <div class="pulse"></div>
                    <span id="statusText">Playing Preview</span>
                </div>
            </div>
            <div class="modal-info">
                <div id="modalSubtitle" class="modal-subtitle">Artist Name</div>
                <div id="modalTitle" class="modal-title">Track Title</div>
                <div id="modalDesc" class="modal-desc">Loading metadata...</div>

                <div class="playback-controls">
                    <button id="playBtn" class="primary-btn" style="display: none;" onclick="togglePlayback()">
                        <span id="playIcon" class="play-icon">▶</span>
                        <span id="playText">Play Preview</span>
                    </button>
                    <div id="trackInfo" style="font-size: 0.8rem; color: var(--text-dim)"></div>
                </div>

                <div style="font-weight: 600; font-size: 0.9rem; color: var(--primary); margin-top: 1rem;">Live Stream
                    Manifest</div>
                <div id="streamData" class="stream-data">Fetching playback manifest...</div>
            </div>
        </div>
    </div>

    <video id="videoElem" crossorigin="anonymous"></video>

    <script>
        let player;
        let isPlaying = false;
        let currentManifest = null;

        async function initPlayer() {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                player = new shaka.Player(document.getElementById('videoElem'));

                // Fix for blob HEAD requests (shaka error 1002)
                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    if (request.method === 'HEAD' && request.uris[0].startsWith('blob:')) {
                        request.method = 'GET';
                    }
                });

                player.addEventListener('error', onPlayerError);
            } else {
                console.error('Browser not supported!');
            }
        }

        function onPlayerError(event) {
            console.error('Shaka Player Error', event.detail);
            if (event.detail.code === 1002) {
                console.warn('Network error 1002 detected - potential CORS or Blob issue.');
            }
        }

        async function apiFetch(path) {
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch(`http://localhost:3000/tidal${path}`);
                const json = await response.json();
                return json.success ? json.data : null;
            } catch (e) {
                console.error(e);
                return null;
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function closeModal() {
            const video = document.getElementById('videoElem');
            document.getElementById('modal').style.display = 'none';
            if (player) {
                player.unload();
                video.pause();
            }
            isPlaying = false;
            updateUI();
        }

        function updateUI() {
            const icon = document.getElementById('playIcon');
            const text = document.getElementById('playText');
            const badge = document.getElementById('playingBadge');

            if (isPlaying) {
                icon.innerText = '⏸';
                text.innerText = 'Pause';
                badge.style.display = 'flex';
            } else {
                icon.innerText = '▶';
                text.innerText = 'Play Preview';
                badge.style.display = 'none';
            }
        }

        async function togglePlayback() {
            const video = document.getElementById('videoElem');
            if (isPlaying) {
                video.pause();
                isPlaying = false;
            } else {
                if (currentManifest) {
                    try {
                        const blob = new Blob([currentManifest], { type: 'application/dash+xml' });
                        const url = URL.createObjectURL(blob);
                        await player.load(url);
                        video.play();
                        isPlaying = true;
                    } catch (e) {
                        console.error('Playback failed', e);
                        alert('Playback error: ' + e.message);
                    }
                }
            }
            updateUI();
        }

        async function openDetails(id, type, item) {
            document.getElementById('modal').style.display = 'flex';
            const artworkUrl = item.artwork;
            const artworkDiv = document.getElementById('modalArtwork');

            if (artworkUrl) {
                artworkDiv.style.backgroundImage = `url('${artworkUrl}')`;
                artworkDiv.innerHTML = '<div id="playingBadge" class="status-badge" style="display: none;"><div class="pulse"></div><span id="statusText">Playing Preview</span></div>';
            } else {
                artworkDiv.style.backgroundImage = 'none';
                artworkDiv.innerHTML = '<div class="artwork-placeholder">♫</div><div id="playingBadge" class="status-badge" style="display: none;"><div class="pulse"></div><span id="statusText">Playing Preview</span></div>';
            }

            document.getElementById('modalTitle').innerText = item.title || item.name || "Unknown Content";
            document.getElementById('modalSubtitle').innerText = (item.artists && item.artists.length) ? item.artists[0].name : type.toUpperCase();
            document.getElementById('modalDesc').innerText = item.description || (item.copyright ? `© ${item.copyright}` : 'High-Fidelity Tidal Resource');
            document.getElementById('streamData').innerText = "Analyzing stream quality...";
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('trackInfo').innerText = item.isrc ? `ISRC: ${item.isrc}` : '';

            isPlaying = false;
            currentManifest = null;
            updateUI();

            if (type === 'track' || type === 'video') {
                const stream = await apiFetch(`/tracks/${id}/stream`);
                if (stream) {
                    document.getElementById('streamData').innerText = JSON.stringify(stream, null, 2);
                    const actualManifest = stream.preview?.manifestDecoded || stream.audio?.manifestDecoded;
                    if (actualManifest) {
                        currentManifest = actualManifest;
                        document.getElementById('playBtn').style.display = 'flex';
                    }
                } else {
                    document.getElementById('streamData').innerText = "Streaming manifests currently restricted.";
                }
            } else {
                document.getElementById('streamData').innerText = "Interactive playback is enabled for Tracks and Videos.";
            }
        }

        function createCard(item, type) {
            const artwork = item.artwork;
            const title = item.title || item.name || "Unknown";
            const meta = (item.artists && item.artists.length) ? item.artists[0].name : (item.releaseDate || type);
            const id = item.id;

            const artworkHTML = artwork
                ? `<div class="artwork" style="background-image: url('${artwork}')"></div>`
                : `<div class="artwork"><div class="artwork-placeholder">♫</div></div>`;

            return `
            <div class="card" onclick='openDetails("${id}", "${type}", ${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                ${artworkHTML}
                <div class="info">
                    <div class="title">${title}</div>
                    <div class="meta">${meta}</div>
                </div>
            </div>
        `;
        }

        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            const results = await apiFetch(`/search?q=${encodeURIComponent(query)}&limit=15`);
            const container = document.getElementById('results');
            container.innerHTML = '';

            if (!results) return;

            const sections = [
                { key: 'tracks', label: 'Tracks', type: 'track' },
                { key: 'albums', label: 'Albums', type: 'album' },
                { key: 'artists', label: 'Artists', type: 'artist' },
                { key: 'playlists', label: 'Playlists', type: 'playlist' },
                { key: 'videos', label: 'Videos', type: 'video' }
            ];

            sections.forEach(sec => {
                if (results[sec.key]?.items?.length) {
                    container.innerHTML += `<h2 class="section-title">${sec.label}</h2>`;
                    container.innerHTML += `<div class="grid">
                    ${results[sec.key].items.map(i => createCard(i, sec.type)).join('')}
                </div>`;
                }
            });
        }

        async function initialLoad() {
            const featured = await apiFetch('/featured');
            const container = document.getElementById('results');

            if (featured && featured.rows) {
                container.innerHTML = '<h2 class="section-title">Home Discoveries</h2>';
                const allItems = [];
                featured.rows.slice(0, 5).forEach(row => {
                    row.modules?.forEach(mod => {
                        if (mod.items) {
                            allItems.push(...mod.items.map(i => ({ ...i, type: mod.type ? mod.type.toLowerCase().slice(0, -1) : 'track' })));
                        }
                    });
                });

                container.innerHTML += `<div class="grid">
                ${allItems.slice(0, 12).map(i => createCard(i, i.type || 'track')).join('')}
            </div>`;
            }
        }

        initPlayer();
        initialLoad();
    </script>

</body>

</html>
